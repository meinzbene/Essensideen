<style>

    --bg: #0f0e0c;
    --surface: #1a1815;
    --surface2: #232018;
    --border: #2e2b25;
    --accent: #e8a838;
    --accent2: #c4732a;
    --text: #f0ead8;
    --text-muted: #8a8070;
    --green: #6a9e6e;
    --red: #c46060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  header {
    text-align: center;
    padding: 60px 20px 30px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: var(--accent);
    margin: 20px auto 0;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 0.95rem;
    letter-spacing: 0.5px;
  }

  /* Filters */
  .filters-section {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .filters-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .filters-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .filter-btn {
    padding: 9px 18px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e0c;
    font-weight: 500;
  }

  .filter-btn .icon {
    font-size: 1rem;
  }

  .filter-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
    align-self: center;
  }

  .filter-count {
    margin-top: 14px;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  .filter-count span {
    color: var(--accent);
    font-weight: 500;
  }

  /* Wheel Section */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 60px;
    gap: 40px;
  }

  .wheel-container {
    position: relative;
    width: min(500px, 90vw);
    height: min(500px, 90vw);
  }

  .wheel-pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent);
    filter: drop-shadow(0 4px 12px rgba(232,168,56,0.5));
  }

  #wheelCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    cursor: grab;
    transition: filter 0.3s;
  }

  #wheelCanvas:active { cursor: grabbing; }

  .wheel-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: var(--bg);
    border: 3px solid var(--accent);
    border-radius: 50%;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }

  .spin-btn {
    padding: 16px 52px;
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 4px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .spin-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .spin-btn:hover::after { opacity: 1; }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,168,56,0.35); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Winner Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.92);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(8px);
    cursor: pointer;
  }

  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 60px 70px;
    text-align: center;
    max-width: 520px;
    width: 90%;
    transform: scale(0.7) translateY(30px);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  .modal-overlay.visible .modal-card {
    transform: scale(1) translateY(0);
  }

  .modal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
  }

  .modal-emoji {
    font-size: 4rem;
    margin-bottom: 20px;
    display: block;
    animation: bounce 0.6s ease 0.3s both;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .modal-subtitle {
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 24px;
    animation: slideUp 0.5s ease 0.2s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    animation: slideUp 0.5s ease 0.35s both;
  }

  .modal-tag {
    padding: 4px 12px;
    border-radius: 3px;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .tag-speed-fast { background: rgba(106,158,110,0.15); color: var(--green); border: 1px solid rgba(106,158,110,0.3); }
  .tag-speed-slow { background: rgba(196,96,96,0.12); color: var(--red); border: 1px solid rgba(196,96,96,0.25); }
  .tag-vegan { background: rgba(106,158,110,0.15); color: var(--green); border: 1px solid rgba(106,158,110,0.3); }
  .tag-meat { background: rgba(196,96,96,0.12); color: var(--red); border: 1px solid rgba(196,96,96,0.25); }
  .tag-sides { background: rgba(232,168,56,0.12); color: var(--accent); border: 1px solid rgba(232,168,56,0.25); }
  .tag-season { background: rgba(100,130,200,0.12); color: #88aadd; border: 1px solid rgba(100,130,200,0.25); }

  .modal-hint {
    color: var(--text-muted);
    font-size: 0.8rem;
    animation: slideUp 0.5s ease 0.5s both;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 1001;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);

  .no-results .emoji { font-size: 3rem; margin-bottom: 16px; }
  .no-results h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }

  /* Season note */
  .season-info {
    max-width: 900px;
    margin: 0 auto 10px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .season-badge {
    padding: 4px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @keyframes wheelSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .spinning { animation: wheelSpin 0.1s linear; }
</style>
</head>

];

// =====================
// STATE
// =====================
const activeFilters = new Set();
let currentDishes = [...DISHES];
let isSpinning = false;
let currentAngle = 0;
let spinVelocity = 0;
let animFrameId = null;
let selectedIndex = 0;

// =====================
// SEASON DETECTION
// =====================
function getCurrentSeason() {
  const month = new Date().getMonth() + 1;
  if (month >= 3 && month <= 5) return "spring";
  if (month >= 6 && month <= 8) return "summer";
  if (month >= 9 && month <= 11) return "fall";
  return "winter";
}

const seasonNames = { spring: "Frühling", summer: "Sommer", fall: "Herbst", winter: "Winter" };
const currentSeason = getCurrentSeason();
document.getElementById('currentSeason').textContent = seasonNames[currentSeason];
document.getElementById('seasonNote').textContent = "Saisonaler Filter verfügbar";

// =====================
// FILTER LOGIC
// =====================
function toggleFilter(btn) {
  const filter = btn.dataset.filter;

  // Exclusive pairs
  if (filter === 'fast' && activeFilters.has('slow')) activeFilters.delete('slow');
  if (filter === 'slow' && activeFilters.has('fast')) activeFilters.delete('fast');
  if (filter === 'vegan' && activeFilters.has('meat')) activeFilters.delete('meat');
  if (filter === 'meat' && activeFilters.has('vegan')) activeFilters.delete('vegan');

  if (activeFilters.has(filter)) {
    activeFilters.delete(filter);
    btn.classList.remove('active');
  } else {
    activeFilters.add(filter);
    btn.classList.add('active');
  }

  // Sync buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (activeFilters.has(b.dataset.filter)) b.classList.add('active');
    else b.classList.remove('active');
  });

  updateDishes();
}

function updateDishes() {
  currentDishes = DISHES.filter(dish => {
    if (activeFilters.has('fast') && !dish.fast) return false;
    if (activeFilters.has('slow') && dish.fast) return false;
    if (activeFilters.has('vegan') && !dish.vegan) return false;
    if (activeFilters.has('meat') && !dish.meat) return false;
    if (activeFilters.has('sides') && !dish.sides) return false;
    if (activeFilters.has('season')) {
      if (!dish.seasons.includes('all') && !dish.seasons.includes(currentSeason)) return false;
    }
    return true;
  });

  document.getElementById('countNum').textContent = currentDishes.length;
  drawWheel();

  const spinBtn = document.getElementById('spinBtn');
  spinBtn.disabled = currentDishes.length === 0;
}

// =====================
// WHEEL DRAWING
// =====================
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const SIZE = 500;
canvas.width = SIZE;
canvas.height = SIZE;

const COLORS = [
  '#2a2520', '#322c25', '#2e2820', '#38301f',
  '#241f1a', '#302820', '#3a3020', '#28221c'
];

function drawWheel() {
  const cx = SIZE / 2, cy = SIZE / 2, r = SIZE / 2 - 4;
  ctx.clearRect(0, 0, SIZE, SIZE);

  if (currentDishes.length === 0) {
    ctx.fillStyle = '#1a1815';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8a8070';
    ctx.font = '16px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('Keine Gerichte', cx, cy - 10);
    ctx.fillText('verfügbar', cx, cy + 14);
    return;
  }

  const n = currentDishes.length;
  const sliceAngle = (2 * Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const startAngle = currentAngle + i * sliceAngle - Math.PI / 2;
    const endAngle = startAngle + sliceAngle;
    const midAngle = startAngle + sliceAngle / 2;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();

    // Highlight selected
    if (i === selectedIndex) {
      ctx.fillStyle = '#3d3420';
    } else {
      ctx.fillStyle = COLORS[i % COLORS.length];
    }
    ctx.fill();

    // Border
    ctx.strokeStyle = '#0f0e0c';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(midAngle);

    const textR = r * 0.62;
    const fontSize = n > 20 ? 9 : n > 12 ? 11 : 13;
    ctx.font = `${fontSize}px DM Sans`;
    ctx.fillStyle = i === selectedIndex ? '#e8a838' : '#c8bda8';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    let name = currentDishes[i].name;
    if (name.length > 18) name = name.substring(0, 16) + '…';
    ctx.fillText(name, textR, 0);

    // Emoji
    ctx.font = `${fontSize + 2}px serif`;
    ctx.textAlign = 'left';
    ctx.fillText(currentDishes[i].emoji, textR + 4, 0);

    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#3d3020';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Accent ring
  ctx.beginPath();
  ctx.arc(cx, cy, r - 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(232,168,56,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function getSelectedIndex() {
  if (currentDishes.length === 0) return 0;
  const n = currentDishes.length;
  const sliceAngle = (2 * Math.PI) / n;
  // Pointer at top = -PI/2, find which slice is there
  let normalized = ((-currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(normalized / sliceAngle) % n;
}

// =====================
// SPIN LOGIC
// =====================
function spinWheel() {
  if (isSpinning || currentDishes.length === 0) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;

  // Random spin: 6-12 full rotations + random
  const totalRotation = (Math.random() * 6 + 6) * 2 * Math.PI;
  const duration = 4000 + Math.random() * 2000;
  const startAngle = currentAngle;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + totalRotation * easeOut(t);
    selectedIndex = getSelectedIndex();
    drawWheel();

    if (t < 1) {
      animFrameId = requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      showWinner();
    }
  }

  animFrameId = requestAnimationFrame(animate);
}

function showWinner() {
  const dish = currentDishes[selectedIndex];
  if (!dish) return;

  document.getElementById('modalEmoji').textContent = dish.emoji;
  document.getElementById('modalTitle').textContent = dish.name;

  // Build tags
  const tagsContainer = document.getElementById('modalTags');
  tagsContainer.innerHTML = '';

  if (dish.fast) {
    tagsContainer.innerHTML += `<span class="modal-tag tag-speed-fast">⚡ Geht schnell</span>`;
  } else {
    tagsContainer.innerHTML += `<span class="modal-tag tag-speed-slow">🕰 Dauert etwas länger</span>`;
  }

  if (dish.vegan) {
    tagsContainer.innerHTML += `<span class="modal-tag tag-vegan">🌱 Vegan</span>`;
  } else if (dish.meat) {
    tagsContainer.innerHTML += `<span class="modal-tag tag-meat">🥩 Mit Fleisch</span>`;
  }

  if (dish.sides) {
    tagsContainer.innerHTML += `<span class="modal-tag tag-sides">🍟 Mit Beilagen</span>`;
  }

  const seasonLabel = dish.seasons.includes('all')
    ? 'Ganzjährig'
    : dish.seasons.map(s => seasonNames[s]).join(', ');
  tagsContainer.innerHTML += `<span class="modal-tag tag-season">📅 ${seasonLabel}</span>`;

  document.getElementById('modalOverlay').classList.add('visible');
  spawnConfetti();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

// =====================
// CONFETTI
// =====================
function spawnConfetti() {
  const colors = ['#e8a838', '#c4732a', '#6a9e6e', '#c46060', '#88aadd', '#f0ead8'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// =====================
// INIT
// =====================
updateDishes();
</script>
